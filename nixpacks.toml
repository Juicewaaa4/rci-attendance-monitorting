[providers]
  [providers.php]
    version = '8.2'

[phases.setup]
  nixPkgs = ['...', 'php82Packages.gd']

[phases.build]
  cmds = [
    'composer install --no-dev --optimize-autoloader',
    'npm install',
    'npm run build',
    'php artisan optimize:clear',
    'php artisan package:discover --ansi',
    'php artisan event:cache',
    'php artisan route:cache',
    'php artisan view:cache'
  ]
